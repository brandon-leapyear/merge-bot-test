version: 2

jobs:
  foo:
    docker:
      - image: centos:7
    steps:
      - run: echo foo
  bar:
    docker:
      - image: centos:7
    steps:
      - run:
          command: sleep 3600
          no_output_timeout: 30m
      - run: cat non-existent

workflows:
  version: 2
  run_foo:
    jobs:
      - foo:
          filters:
            branches:
              only:
                - /trying-.*/
                - /staging-.*/
      - bar:
          requires:
            - foo
